<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RYDE — Never overpay for a flight{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
    {% block head %}{% endblock %}
</head>
<body class="bg-white text-gray-900 min-h-screen flex flex-col">

    <nav class="border-b border-gray-100 px-6 py-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <a href="/" class="font-bold text-blue-600 text-lg tracking-tight">R.Y.D.E.</a>
            <a href="/register" class="bg-blue-600 text-white text-sm font-medium px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors">
                Monitor a flight &rarr;
            </a>
        </div>
    </nav>

    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-gray-100 py-8 text-center text-sm text-gray-400">
        <p>&copy; 2026 R.Y.D.E. &mdash; You only pay when we save you money.</p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
