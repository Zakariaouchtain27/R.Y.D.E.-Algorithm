<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RYDE — Start for Free</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-md">
    <!-- Header -->
    <div class="text-center mb-10">
      <a href="/" class="inline-block font-bold text-indigo-400 text-lg tracking-tight mb-6">R.Y.D.E.</a>
      <div class="inline-flex items-center gap-2 text-xs font-mono font-semibold px-3 py-1.5 rounded-full mb-4"
           style="background: rgba(55,65,81,0.6); color:#9ca3af; border: 1px solid #374151;">
        FREE PLAN &mdash; 5 BOOKINGS
      </div>
      <h1 class="text-3xl font-extrabold mb-2">Get your API key</h1>
      <p class="text-gray-400 text-sm">No credit card required. Start monitoring in minutes.</p>
    </div>

    <!-- Form -->
    <form method="POST" action="/signup" class="space-y-5">
      <div>
        <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wider">Agency Name</label>
        <input type="text" name="name" required placeholder="Acme Travel"
               class="w-full px-4 py-3 rounded-xl text-white text-sm outline-none transition-all"
               style="background:#111827; border: 1px solid #374151;"
               onfocus="this.style.borderColor='#7c6af7'" onblur="this.style.borderColor='#374151'">
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wider">Work Email</label>
        <input type="email" name="email" required placeholder="you@agency.com"
               class="w-full px-4 py-3 rounded-xl text-white text-sm outline-none transition-all"
               style="background:#111827; border: 1px solid #374151;"
               onfocus="this.style.borderColor='#7c6af7'" onblur="this.style.borderColor='#374151'">
      </div>

      {% if error %}
      <div class="rounded-xl px-4 py-3 text-sm text-red-400" style="background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);">
        {{ error }}
      </div>
      {% endif %}

      <button type="submit"
              class="w-full font-semibold py-3 px-6 rounded-xl transition-all text-sm mt-2"
              style="background:#7c6af7; color:white;"
              onmouseover="this.style.background='#6d5ce6'" onmouseout="this.style.background='#7c6af7'">
        Create free account &rarr;
      </button>
    </form>

    <p class="text-center text-xs text-gray-600 mt-6">
      Need more than 5 bookings?
      <a href="/pricing" class="text-indigo-400 hover:text-indigo-300">See all plans</a>
    </p>
  </div>

</body>
</html>
